<section class="m3-envelope-section m3-hidden" id="envelope-section">
    <div class="m3-envelope-wrapper">
        
        <div class="m3-envelope" id="envelope">
            <div class="m3-envelope__flap"></div>
            
            <div class="m3-envelope__pocket"></div>
            
            <div class="m3-envelope__card" id="inner-card">
                <div class="m3-inner-card__scroll-container">
                    
                    <div class="m3-card-section m3-card-header">
                        <span class="material-symbols-outlined m3-inner-card__icon">celebration</span>
                        <h2 class="m3-typography--title-large">¡Estás Invitado!</h2>
                        <p class="m3-typography--body-medium">Acompáñanos a celebrar nuestra historia de amor.</p>
                    </div>

                    <div class="m3-card-section m3-card-photo-wrapper">
                        <div class="m3-card-photo" style="background-image: url('https://picsum.photos/800/1000');">
                            <div class="m3-card-photo__overlay"></div>
                        </div>
                    </div>

                    <div class="m3-card-section m3-countdown">
                        <p class="m3-countdown__title">FALTAN SÓLO:</p>
                        <div class="m3-countdown__grid">
                            <div class="m3-countdown__box">
                                <span class="m3-countdown__number" id="timer-days">00</span>
                                <span class="m3-countdown__label">Días</span>
                            </div>
                            <div class="m3-countdown__box">
                                <span class="m3-countdown__number" id="timer-hours">00</span>
                                <span class="m3-countdown__label">Horas</span>
                            </div>
                            <div class="m3-countdown__box">
                                <span class="m3-countdown__number" id="timer-minutes">00</span>
                                <span class="m3-countdown__label">Min</span>
                            </div>
                            <div class="m3-countdown__box">
                                <span class="m3-countdown__number" id="timer-seconds">00</span>
                                <span class="m3-countdown__label">Seg</span>
                            </div>
                        </div>
                    </div>

                    <div class="m3-scroll-indicator">
                        <span class="material-symbols-outlined">keyboard_double_arrow_down</span>
                        <p class="m3-typography--label-small">Desliza para ver ubicaciones</p>
                    </div>

                </div>
            </div>
        </div>

    </div>
</section>
