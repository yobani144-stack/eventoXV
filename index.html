<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XV Diana | Glam Edition</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- CSS Grid: Contenedor Principal (Simulador Móvil en Desktop) -->
    <main class="app-grid" id="appContainer">
        
        <section class="hero-cover" id="heroCover">
    <!-- Grid interno para la maquetación de la portada -->
    <div class="hero-grid">
        
        <!-- Bloque superior: Branding del evento -->
        <header class="hero-header">
            <span class="hero-tag">CELEBRACIÓN EXCLUSIVA</span>
            <div class="hero-line-decorator"></div>
        </header>

        <!-- Bloque central: El nombre de Diana destacado -->
        <div class="hero-middle">
            <p class="hero-subtitle">MIS XV AÑOS</p>
            <h1 class="hero-title">Diana</h1>
            <p class="hero-date">24 . 10 . 2026</p> <!-- Ajustable a la fecha real -->
        </div>

        <!-- Bloque inferior: Botón interactivo de acceso con Flexbox -->
        <footer class="hero-footer">
            <button class="btn-glam" id="btnEnter" aria-label="Ingresar a la invitación">
                <span class="btn-text">ABRIR INVITACIÓN</span>
                <span class="btn-shine"></span>
            </button>
            <p class="hero-footer-note">Diseñado exclusivamente para familiares y amigos</p>
        </footer>

    </div>
</section>
    </main>

    <script src="js/main.js"></script>
    <script src="js/particles.js"></script>
</body>
</html>
