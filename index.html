<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XV Diana | Glam Edition</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- CSS Grid: Contenedor Principal (Simulador Móvil en Desktop) -->
    <main class="app-grid" id="appContainer">
        
        <!-- Canvas para efectos visuales flotantes -->
        <canvas id="particles-canvas"></canvas>

        <!-- CSS Flexbox: Sección del Sobre Digital Interactivo -->
        <section class="section-flex envelope-section" id="envelopeWrapper">
            
            <div class="envelope-box">
                <!-- Solapa Superior -->
                <div class="envelope-flap"></div>
                
                <!-- Cuerpo del Sobre -->
                <div class="envelope-body"></div>
                
                <!-- Sello con Flexbox -->
                <button class="wax-seal" id="waxSeal" aria-label="Abrir invitación">
                    <span class="seal-text">D · XV</span>
                </button>
                
                <!-- Carta/Invitación interna con Flexbox -->
                <article class="letter-card" id="mainLetter">
                    <div class="letter-border">
                        <span class="letter-tag">XV AÑOS</span>
                        <h1 class="letter-name">Diana</h1>
                        <hr class="letter-line">
                        <p class="letter-phrase">Una noche glamurosa e inolvidable</p>
                        <span class="letter-scroll">Desliza hacia arriba ↓</span>
                    </div>
                </article>
            </div>
            
            <p class="interaction-hint">Toca el sello de oro para ingresar</p>
        </section>

        <!-- Las siguientes secciones (Contador, Ubicaciones, RSVP) se añadirán aquí abajo flotando en el flujo del Grid -->

    </main>

    <script src="js/main.js"></script>
</body>
</html>
