<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XV Años Diana | Invitación Digital Glam</title>
    <!-- Estilos Principales -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Contenedor Premium (Mobile-First) -->
    <div class="app-container" id="appContainer">
        
        <!-- Canvas para la lluvia de partículas de oro -->
        <canvas id="particles-canvas"></canvas>

        <!-- Aquí construiremos modularmente las secciones -->
        <!-- PARTE 1: El Sobre Digital Interactiva (Siguiente paso) -->
        <!-- SECCIÓN 1: SOBRE DIGITAL INTERACTIVO -->
<div class="envelope-wrapper" id="envelopeWrapper">
    <div class="envelope" id="envelope">
        
        <!-- Solapa Superior (Flap) -->
        <div class="envelope-flap"></div>
        
        <!-- Caras internas y laterales del sobre -->
        <div class="envelope-pocket"></div>
        
        <!-- Sello de Cera Dorado Interactivo -->
        <div class="wax-seal" id="waxSeal">
            <div class="seal-inner">D · XV</div>
        </div>
        
        <!-- La Invitación Premium (Oculta dentro del sobre) -->
        <div class="letter" id="mainLetter">
            <div class="letter-content">
                <p class="letter-subtitle">XV AÑOS</p>
                <h1 class="letter-title">Diana</h1>
                <div class="letter-divider"></div>
                <p class="letter-tagline">Una noche llena de brillo y elegancia</p>
                <span class="scroll-indicator">Desliza hacia arriba ↓</span>
            </div>
        </div>

    </div>
    <p class="envelope-hint">Toca el sello dorado para abrir</p>
</div>
    </div>

    <!-- Scripts del Proyecto -->
    <script href="js/main.js"></script>
    <script href="js/particles.js"></script>
  
</body>
</html>
