<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Digital - M3</title>
    <!-- Fuentes de Google: Roboto para M3 y Playfair Display para un toque elegante opcional -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Iconos Oficiales de Material Design 3 -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- PORTADA (HERO SECTION) -->
   <section class="m3-hero" id="hero-section">
    <div class="m3-hero__pattern"></div>
    
    <div class="m3-card">
        <div class="m3-card__border-line"></div>
        <div class="m3-card__content">
            
            <p class="m3-typography--label-large text-editable" id="edit-event-type">NUESTRA BODA</p>
            
            <h1 class="m3-typography--display-large text-editable" id="edit-main-title">
                Alejandro <span class="m3-ampersand">&amp;</span> Sofía
            </h1>
            
            <p class="m3-typography--headline-medium text-editable" id="edit-hero-date">12 . 12 . 2026</p>
            
            <button class="m3-btn m3-btn--filled" id="btn-open-invitation">
                <span class="material-symbols-outlined m3-btn__icon">mail</span>
                <span class="m3-btn__label">Abrir Invitación</span>
                <span class="m3-ripple"></span>
            </button>
            
        </div>
    </div>
</section>

    <script src="js/script.js"></script>
</body>
</html>
